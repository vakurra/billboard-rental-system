{% extends "base.html" %}

{% block extra_styles %}
<link rel="stylesheet" href="{{ url_for('reports.static', filename='styles.css') }}">
{% endblock %}

{% block title %}Ошибка{% endblock %}

{% block content %}
<div class="report-error">
    <h2>Ошибка</h2>
    <p>{{ err_message }}</p>
    <form action="{{ url_for('reports.menu') }}" method="get">
        <button type="submit">Вернуться к работе с отчетами</button>
    </form>
</div>
{% endblock %}
